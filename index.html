<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DealSpace</title>
  <script>
    // Catch any pre-React JS errors and show them on screen
    window.onerror = function(msg, src, line, col, err) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#1a0000;color:#f87171;padding:16px;font-family:monospace;font-size:12px;z-index:99999;white-space:pre-wrap';
      d.textContent = '⚠ JS Error: ' + msg + '\n' + (src||'') + ':' + line;
      document.body.appendChild(d);
    };
    window.addEventListener('unhandledrejection', function(e) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#1a0000;color:#f87171;padding:16px;font-family:monospace;font-size:12px;z-index:99999;white-space:pre-wrap';
      d.textContent = '⚠ Unhandled Promise: ' + (e.reason && e.reason.message || e.reason);
      document.body.appendChild(d);
    });
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
